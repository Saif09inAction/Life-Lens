<svg width="400" height="320" viewBox="0 0 400 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="lensGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tealGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Left lens - large circle with purple-blue gradient -->
  <circle cx="130" cy="100" r="48" stroke="url(#glowGrad)" stroke-width="4" fill="none" filter="url(#lensGlow)"/>
  <!-- Right lens -->
  <circle cx="270" cy="100" r="48" stroke="url(#glowGrad)" stroke-width="4" fill="none" filter="url(#lensGlow)"/>
  <!-- Bridge - inverted V -->
  <path d="M178 55 L200 75 L222 55" stroke="url(#glowGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Left temple arm -->
  <path d="M82 100 L50 100 L35 95" stroke="url(#glowGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Right temple arm -->
  <path d="M318 100 L350 100 L365 95" stroke="url(#glowGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Left lens - teal internal display -->
  <rect x="95" y="85" width="70" height="28" rx="6" fill="rgba(6,182,212,0.4)" stroke="#06b6d4" stroke-width="1.5" filter="url(#tealGlow)"/>
  <!-- Right lens - teal internal display -->
  <rect x="235" y="85" width="70" height="28" rx="6" fill="rgba(6,182,212,0.4)" stroke="#06b6d4" stroke-width="1.5" filter="url(#tealGlow)"/>
  <!-- Left sensor dot -->
  <circle cx="130" cy="125" r="5" fill="#06b6d4" filter="url(#tealGlow)"/>
  <!-- Right sensor dot -->
  <circle cx="270" cy="125" r="5" fill="#06b6d4" filter="url(#tealGlow)"/>
  <!-- Text -->
  <text x="200" y="255" fill="#ffffff" font-size="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="500">AI-Powered • Real-time Processing</text>
</svg>
